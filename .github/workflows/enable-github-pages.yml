name: Enable GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (GitHub Actions source)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAGES_ADMIN_TOKEN }}
          script: |
            const token = core.getInput('github-token');
            if (!token) {
              core.setFailed(
                [
                  'Missing repository secret GH_PAGES_ADMIN_TOKEN.',
                  '',
                  'GITHUB_TOKEN cannot create a Pages site on a new repository.',
                  'Create a fine-grained PAT:',
                  '  1. https://github.com/settings/tokens?type=beta',
                  '  2. Repository access: only this repository',
                  '  3. Permissions: Administration (Read and write), Pages (Read and write)',
                  '  4. Add the token as repository secret GH_PAGES_ADMIN_TOKEN',
                  '',
                  'Or enable manually: Settings → Pages → Build and deployment → GitHub Actions',
                  'Or run locally: ./scripts/enable-github-pages.sh',
                ].join('\n')
              );
              return;
            }

            const [owner, repo] = context.repo;

            async function getPages() {
              try {
                const { data } = await github.rest.repos.getPages({ owner, repo });
                return data;
              } catch (error) {
                if (error.status === 404) return null;
                throw error;
              }
            }

            let pages = await getPages();

            if (!pages) {
              core.info('Pages not configured (404). Creating site with build_type=workflow...');
              try {
                const { data } = await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: 'workflow',
                });
                pages = data;
              } catch (error) {
                if (error.status === 403) {
                  core.setFailed(
                    [
                      'Forbidden (403): GH_PAGES_ADMIN_TOKEN cannot enable Pages on this repository.',
                      '',
                      'Ensure the PAT has Administration (Read and write) and Pages (Read and write)',
                      'for this repository, or enable Pages manually:',
                      'Settings → Pages → Build and deployment → GitHub Actions',
                    ].join('\n')
                  );
                  return;
                }
                throw error;
              }
            } else if (pages.build_type !== 'workflow') {
              core.info(`Updating Pages build_type from ${pages.build_type} to workflow...`);
              const { data } = await github.rest.repos.updateInformationAboutPagesSite({
                owner,
                repo,
                build_type: 'workflow',
              });
              pages = data;
            } else {
              core.info('Pages already uses GitHub Actions as the source.');
            }

            core.info(
              JSON.stringify(
                {
                  build_type: pages.build_type,
                  status: pages.status,
                  html_url: pages.html_url,
                },
                null,
                2
              )
            );
