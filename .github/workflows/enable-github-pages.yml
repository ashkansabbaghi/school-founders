name: Enable GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/enable-github-pages.yml

permissions:
  pages: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (GitHub Actions source)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          AUTH=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")

          status=$(curl -s -o /tmp/pages.json -w '%{http_code}' "${AUTH[@]}" "$API")
          echo "Current Pages API status: $status"
          cat /tmp/pages.json || true
          echo

          if [ "$status" = "404" ]; then
            curl -fsSL -X POST "${AUTH[@]}" "$API" -d '{"build_type":"workflow"}'
          else
            curl -fsSL -X PUT "${AUTH[@]}" "$API" -d '{"build_type":"workflow"}'
          fi

          echo "Verifying Pages configuration..."
          curl -fsSL "${AUTH[@]}" "$API"
